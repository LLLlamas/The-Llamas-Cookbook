name: LlamasCookbookNative
options:
  bundleIdPrefix: com.llamascookbook
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: GYFN949Q5E
targets:
  LlamasCookbookNative:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.llamascookbook.app.native
        PRODUCT_NAME: LlamasCookbook
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Llamas Cookbook"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_STRICT_CONCURRENCY: complete
