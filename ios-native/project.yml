name: LlamasCookbookNative
options:
  bundleIdPrefix: com.llamascookbook
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: GYFN949Q5E
targets:
  LlamasCookbookNative:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
      # Timer alarm sound — generated at CI time via ffmpeg + afconvert
      # (see .github/workflows/ios-native-ci.yml "Generate timer alarm
      # sound" step). Not committed to git. If missing locally, the app
      # falls back to the system default notification ding.
      - path: Resources/timer-alarm.caf
        optional: true
    dependencies:
      - target: LlamasCookbookTimerWidget
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.llamascookbook.app
        PRODUCT_NAME: LlamasCookbook
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: "Llamas Cookbook"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_STRICT_CONCURRENCY: minimal
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        # Signing — $(MAIN_PROFILE_NAME) is passed as a CLI arg by the CI
        # workflow (xcodebuild treats CLI args as top-level build settings,
        # so $(...) references resolve at archive time). Each target
        # carries its own specifier so we don't need to do any per-target
        # CLI gymnastics.
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: "$(MAIN_PROFILE_NAME)"

  LlamasCookbookTimerWidget:
    type: app-extension
    platform: iOS
    sources:
      # Widget UI + @main bundle
      - path: WidgetExtension
      # Shared ActivityAttributes — same Swift type used by app + widget
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.llamascookbook.app.widget
        PRODUCT_NAME: LlamasCookbookTimerWidget
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: WidgetExtension/Info.plist
        SKIP_INSTALL: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_STRICT_CONCURRENCY: minimal
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: "$(WIDGET_PROFILE_NAME)"
