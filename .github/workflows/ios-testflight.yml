name: iOS TestFlight

# Builds an iOS app on a GitHub-hosted macOS runner using Expo prebuild + Xcode,
# then uploads the .ipa to TestFlight via `xcrun altool` with an App Store
# Connect API key.
#
# Required repo secrets (set at
#   https://github.com/LLLlamas/The-Llamas-Cookbook/settings/secrets/actions):
#
#   IOS_DIST_CERT_P12_BASE64          base64 of iOS Distribution .p12
#   IOS_DIST_CERT_P12_PASSWORD        password for that .p12
#   IOS_PROVISIONING_PROFILE_BASE64   base64 of App Store .mobileprovision
#   APPSTORE_API_KEY_P8_BASE64        base64 of AuthKey_<KEYID>.p8
#   APPSTORE_API_KEY_ID               10-char ASC API Key ID
#   APPSTORE_API_ISSUER_ID            ASC API issuer UUID
#
# The build number is set to github.run_number so every run produces a fresh
# CFBundleVersion for TestFlight. Bump `expo.version` in app.json when you
# want a new marketing version.

on:
  workflow_dispatch:
    inputs:
      upload:
        description: Upload .ipa to TestFlight?
        type: boolean
        default: true

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

env:
  APPLE_TEAM_ID: GYFN949Q5E
  BUNDLE_ID: com.llamascookbook.app

jobs:
  build:
    name: Build + upload
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Decode signing assets
        env:
          P12_B64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEY_P8_B64: ${{ secrets.APPSTORE_API_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/signing/dist.p12"
          echo "$PROFILE_B64" | base64 --decode > "$RUNNER_TEMP/signing/profile.mobileprovision"
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$KEY_P8_B64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: Create signing keychain
        env:
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_P12_PASSWORD }}
        run: |
          set -euo pipefail
          KC_PATH="$RUNNER_TEMP/build.keychain-db"
          KC_PASS=$(openssl rand -base64 24)
          echo "KC_PATH=$KC_PATH" >> "$GITHUB_ENV"
          echo "::add-mask::$KC_PASS"
          security create-keychain -p "$KC_PASS" "$KC_PATH"
          security set-keychain-settings -lut 21600 "$KC_PATH"
          security unlock-keychain -p "$KC_PASS" "$KC_PATH"
          security import "$RUNNER_TEMP/signing/dist.p12" \
            -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KC_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" "$KC_PATH" >/dev/null
          security list-keychain -d user -s "$KC_PATH" login.keychain

      - name: Install provisioning profile
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          PROFILE_SRC="$RUNNER_TEMP/signing/profile.mobileprovision"
          # Extract UUID and Name from the profile (it's a CMS-wrapped plist)
          PROFILE_PLIST=$(security cms -D -i "$PROFILE_SRC")
          PROFILE_UUID=$(echo "$PROFILE_PLIST" | /usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin)
          PROFILE_NAME=$(echo "$PROFILE_PLIST" | /usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin)
          cp "$PROFILE_SRC" "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed profile: $PROFILE_NAME ($PROFILE_UUID)"

      - name: Expo prebuild (generate native iOS project)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Show ios/ tree after prebuild
        run: |
          echo "--- ios/ top level ---"
          ls -la ios/ || true
          echo "--- workspaces/projects ---"
          find ios -maxdepth 3 \( -name "*.xcworkspace" -o -name "*.xcodeproj" \) -print || true
          echo "--- Podfile head ---"
          head -40 ios/Podfile 2>/dev/null || echo "no Podfile"
          echo "--- Gemfile? ---"
          cat ios/Gemfile 2>/dev/null || cat Gemfile 2>/dev/null || echo "no Gemfile"

      - name: Install CocoaPods
        working-directory: ios
        run: |
          set -euo pipefail
          if [ -f ../Gemfile ] || [ -f Gemfile ]; then
            echo "Gemfile found, using bundler"
            bundle install
            bundle exec pod install --repo-update
          else
            pod install --repo-update
          fi

      - name: Show ios/ tree after pod install
        run: |
          ls -la ios/ || true
          echo "--- xcworkspace contents ---"
          for ws in ios/*.xcworkspace; do
            echo "Workspace: $ws"
            ls -la "$ws" || true
          done

      - name: Bump CFBundleVersion in Info.plist
        run: |
          set -euo pipefail
          INFO_PLIST=$(find ios -maxdepth 3 -name "Info.plist" -not -path "*/Pods/*" -not -path "*/build/*" | head -1)
          if [ -z "$INFO_PLIST" ]; then
            echo "::error::Could not locate Info.plist under ios/"
            exit 1
          fi
          BUILD_NUMBER="${{ github.run_number }}"
          echo "Info.plist: $INFO_PLIST"
          echo "Before: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$INFO_PLIST" 2>/dev/null || echo 'not set')"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$INFO_PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NUMBER" "$INFO_PLIST"
          echo "After:  $(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$INFO_PLIST")"

      - name: Discover Xcode workspace + scheme
        run: |
          set -euo pipefail
          shopt -s nullglob
          WORKSPACES=(ios/*.xcworkspace)
          shopt -u nullglob
          if [ ${#WORKSPACES[@]} -eq 0 ]; then
            echo "::error::No .xcworkspace in ios/ — pod install did not produce one."
            exit 1
          fi
          WORKSPACE=""
          for ws in "${WORKSPACES[@]}"; do
            if [ -f "$ws/contents.xcworkspacedata" ]; then
              WORKSPACE="$ws"
              break
            fi
          done
          if [ -z "$WORKSPACE" ]; then
            echo "::error::Found .xcworkspace dir(s) but none contain contents.xcworkspacedata"
            echo "Candidates: ${WORKSPACES[*]}"
            exit 1
          fi
          # Scheme name = workspace basename (Expo prebuild convention).
          # Verify it actually exists in the workspace's scheme list; fall back to first app scheme.
          WS_BASE=$(basename "$WORKSPACE" .xcworkspace)
          ALL_SCHEMES=$(xcodebuild -workspace "$WORKSPACE" -list -json \
            | python3 -c "import sys,json; print('\n'.join(json.load(sys.stdin)['workspace']['schemes']))")
          echo "All schemes:"
          echo "$ALL_SCHEMES" | sed 's/^/  /'
          if echo "$ALL_SCHEMES" | grep -qx "$WS_BASE"; then
            SCHEME="$WS_BASE"
          else
            SCHEME=$(echo "$ALL_SCHEMES" | head -1)
          fi
          echo "WORKSPACE=$WORKSPACE" >> "$GITHUB_ENV"
          echo "SCHEME=$SCHEME" >> "$GITHUB_ENV"
          echo "Workspace: $WORKSPACE"
          echo "Scheme:    $SCHEME"

      - name: Archive
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            archive

      - name: Export .ipa
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>stripSwiftSymbols</key><true/>
            <key>uploadSymbols</key><true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          IPA=$(ls "$RUNNER_TEMP/export"/*.ipa | head -1)
          echo "IPA=$IPA" >> "$GITHUB_ENV"
          echo "Built $IPA"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.run_number }}
          path: ${{ env.IPA }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload to TestFlight
        if: ${{ inputs.upload }}
        env:
          KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID" \
            --verbose
