name: iOS Native (Swift) TestFlight

# Builds the SwiftUI port in ios-native/ on a macos-latest runner, archives
# it, and uploads to TestFlight via xcrun altool. Two targets ship in this
# archive: the main app (com.llamascookbook.app) and the Live Activity
# widget extension (com.llamascookbook.app.widget). Each needs its own
# App Store provisioning profile.
#
# Required repo secrets:
#
#   IOS_DIST_CERT_P12_BASE64              base64 of iOS Distribution .p12
#   IOS_DIST_CERT_P12_PASSWORD            password for that .p12
#   IOS_PROVISIONING_PROFILE_BASE64       base64 of App Store .mobileprovision
#                                          for com.llamascookbook.app
#   IOS_WIDGET_PROVISIONING_PROFILE_BASE64 base64 of App Store .mobileprovision
#                                          for com.llamascookbook.app.widget
#                                          (see ROADMAP.md for setup steps)
#   APPSTORE_API_KEY_P8_BASE64            base64 of AuthKey_<KEYID>.p8
#   APPSTORE_API_KEY_ID                   10-char ASC API Key ID
#   APPSTORE_API_ISSUER_ID                ASC API issuer UUID

on:
  workflow_dispatch:
    inputs:
      upload:
        description: Upload .ipa to TestFlight?
        type: boolean
        default: true

concurrency:
  group: ios-native-${{ github.ref }}
  cancel-in-progress: false

env:
  APPLE_TEAM_ID: GYFN949Q5E
  BUNDLE_ID: com.llamascookbook.app
  WIDGET_BUNDLE_ID: com.llamascookbook.app.widget

jobs:
  build:
    name: Build + upload (Swift)
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ios-native

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Decode signing assets
        env:
          P12_B64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          WIDGET_PROFILE_B64: ${{ secrets.IOS_WIDGET_PROVISIONING_PROFILE_BASE64 }}
          KEY_P8_B64: ${{ secrets.APPSTORE_API_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/signing/dist.p12"
          echo "$PROFILE_B64" | base64 --decode > "$RUNNER_TEMP/signing/profile.mobileprovision"
          echo "$WIDGET_PROFILE_B64" | base64 --decode > "$RUNNER_TEMP/signing/widget.mobileprovision"
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$KEY_P8_B64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: Create signing keychain
        env:
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_P12_PASSWORD }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          KC_PATH="$RUNNER_TEMP/build.keychain-db"
          KC_PASS=$(openssl rand -base64 24)
          echo "KC_PATH=$KC_PATH" >> "$GITHUB_ENV"
          echo "::add-mask::$KC_PASS"
          security create-keychain -p "$KC_PASS" "$KC_PATH"
          security set-keychain-settings -lut 21600 "$KC_PATH"
          security unlock-keychain -p "$KC_PASS" "$KC_PATH"
          security import "$RUNNER_TEMP/signing/dist.p12" \
            -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KC_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" "$KC_PATH" >/dev/null
          security list-keychain -d user -s "$KC_PATH" login.keychain

      - name: Install provisioning profiles
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"

          # Main app profile
          MAIN_SRC="$RUNNER_TEMP/signing/profile.mobileprovision"
          MAIN_PLIST=$(security cms -D -i "$MAIN_SRC")
          MAIN_UUID=$(echo "$MAIN_PLIST" | /usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin)
          MAIN_NAME=$(echo "$MAIN_PLIST" | /usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin)
          cp "$MAIN_SRC" "$PROFILE_DIR/$MAIN_UUID.mobileprovision"
          echo "PROFILE_UUID=$MAIN_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$MAIN_NAME" >> "$GITHUB_ENV"
          echo "Installed main profile: $MAIN_NAME ($MAIN_UUID)"

          # Widget extension profile
          WIDGET_SRC="$RUNNER_TEMP/signing/widget.mobileprovision"
          WIDGET_PLIST=$(security cms -D -i "$WIDGET_SRC")
          WIDGET_UUID=$(echo "$WIDGET_PLIST" | /usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin)
          WIDGET_NAME=$(echo "$WIDGET_PLIST" | /usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin)
          cp "$WIDGET_SRC" "$PROFILE_DIR/$WIDGET_UUID.mobileprovision"
          echo "WIDGET_PROFILE_UUID=$WIDGET_UUID" >> "$GITHUB_ENV"
          echo "WIDGET_PROFILE_NAME=$WIDGET_NAME" >> "$GITHUB_ENV"
          echo "Installed widget profile: $WIDGET_NAME ($WIDGET_UUID)"

      - name: Generate placeholder app icon
        run: |
          set -euo pipefail
          if ! command -v magick >/dev/null 2>&1 && ! command -v convert >/dev/null 2>&1; then
            echo "Installing ImageMagick..."
            brew install imagemagick
          fi
          IM=$(command -v magick || command -v convert)
          ICON_DIR="Resources/Assets.xcassets/AppIcon.appiconset"
          ICON_PATH="$ICON_DIR/AppIcon.png"

          # Intentionally no text. Font resolution through Homebrew's
          # ImageMagick on macOS runners is unreliable (fontconfig doesn't
          # index system fonts, downloaded TTFs sometimes 404 from Google
          # Fonts' static paths). Apple's validation only cares that the
          # 1024x1024 PNG exists; the content is cosmetic. Use pure drawing
          # primitives so this step cannot fail on missing fonts.
          "$IM" -size 1024x1024 xc:"#C97C5D" \
            -fill "#FFFDF8" \
            -draw "circle 512,512 512,180" \
            -fill "#2B2320" \
            -draw "circle 440,440 440,420" \
            -draw "circle 584,440 584,420" \
            "$ICON_PATH"
          echo "Generated $ICON_PATH"
          ls -la "$ICON_PATH"

      - name: Archive
        run: |
          set -euo pipefail
          # Unix timestamp as CFBundleVersion — always unique, always
          # monotonically increasing. Solves the collision on workflow
          # re-runs (same github.run_number would produce the same build
          # number and TestFlight rejects duplicates). Timestamps also
          # stay comfortably above any previous offset-based build numbers.
          BUILD_NUMBER=$(date -u +%s)
          echo "Using CFBundleVersion: $BUILD_NUMBER"
          # Per-target profiles — project.yml sets
          # PROVISIONING_PROFILE_SPECIFIER to $(MAIN_PROFILE_NAME) on the
          # main app target and $(WIDGET_PROFILE_NAME) on the widget.
          # xcodebuild treats these CLI args as top-level build settings
          # that those $(...) references resolve to at archive time, so
          # each target gets its own profile without any fragile global
          # override.
          # CODE_SIGN_IDENTITY is intentionally not set here — let xcodebuild
          # derive it from the provisioning profile's embedded cert. That
          # way it works whether the .p12 is an "Apple Distribution" or a
          # legacy "iPhone Distribution" cert without us having to guess.
          xcodebuild \
            -project LlamasCookbookNative.xcodeproj \
            -scheme LlamasCookbookNative \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            MAIN_PROFILE_NAME="$PROFILE_NAME" \
            WIDGET_PROFILE_NAME="$WIDGET_PROFILE_NAME" \
            archive

      - name: Export .ipa
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>stripSwiftSymbols</key><true/>
            <key>uploadSymbols</key><true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
              <key>${WIDGET_BUNDLE_ID}</key>
              <string>${WIDGET_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          IPA=$(ls "$RUNNER_TEMP/export"/*.ipa | head -1)
          echo "IPA=$IPA" >> "$GITHUB_ENV"
          echo "Built $IPA"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-native-ipa-${{ github.run_number }}
          path: ${{ env.IPA }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload to TestFlight
        if: ${{ inputs.upload }}
        env:
          KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID" \
            --verbose
