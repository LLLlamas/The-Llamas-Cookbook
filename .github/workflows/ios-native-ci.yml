name: iOS Native (Swift) TestFlight

# Builds the SwiftUI port in ios-native/ on a macos-latest runner, archives
# it, and uploads to TestFlight via xcrun altool. Shares signing credentials
# with the RN workflow because Swift and RN ship under the same bundle id
# (com.llamascookbook.app). IMPORTANT: only run one of the two workflows to
# TestFlight at a time — the more recent upload wins.
#
# Required repo secrets (same as the RN workflow):
#
#   IOS_DIST_CERT_P12_BASE64          base64 of iOS Distribution .p12
#   IOS_DIST_CERT_P12_PASSWORD        password for that .p12
#   IOS_PROVISIONING_PROFILE_BASE64   base64 of App Store .mobileprovision
#   APPSTORE_API_KEY_P8_BASE64        base64 of AuthKey_<KEYID>.p8
#   APPSTORE_API_KEY_ID               10-char ASC API Key ID
#   APPSTORE_API_ISSUER_ID            ASC API issuer UUID

on:
  workflow_dispatch:
    inputs:
      upload:
        description: Upload .ipa to TestFlight?
        type: boolean
        default: true

concurrency:
  group: ios-native-${{ github.ref }}
  cancel-in-progress: false

env:
  APPLE_TEAM_ID: GYFN949Q5E
  BUNDLE_ID: com.llamascookbook.app
  # Swift workflow needs a CFBundleVersion that never collides with a previous
  # RN upload. RN runs number ~= single digits at time of writing. 10000+
  # gives decades of headroom for both workflows to coexist.
  BUILD_NUMBER_OFFSET: 10000

jobs:
  build:
    name: Build + upload (Swift)
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ios-native

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Decode signing assets
        env:
          P12_B64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEY_P8_B64: ${{ secrets.APPSTORE_API_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/signing/dist.p12"
          echo "$PROFILE_B64" | base64 --decode > "$RUNNER_TEMP/signing/profile.mobileprovision"
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$KEY_P8_B64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: Create signing keychain
        env:
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_P12_PASSWORD }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          KC_PATH="$RUNNER_TEMP/build.keychain-db"
          KC_PASS=$(openssl rand -base64 24)
          echo "KC_PATH=$KC_PATH" >> "$GITHUB_ENV"
          echo "::add-mask::$KC_PASS"
          security create-keychain -p "$KC_PASS" "$KC_PATH"
          security set-keychain-settings -lut 21600 "$KC_PATH"
          security unlock-keychain -p "$KC_PASS" "$KC_PATH"
          security import "$RUNNER_TEMP/signing/dist.p12" \
            -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KC_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" "$KC_PATH" >/dev/null
          security list-keychain -d user -s "$KC_PATH" login.keychain

      - name: Install provisioning profile
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          PROFILE_SRC="$RUNNER_TEMP/signing/profile.mobileprovision"
          PROFILE_PLIST=$(security cms -D -i "$PROFILE_SRC")
          PROFILE_UUID=$(echo "$PROFILE_PLIST" | /usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin)
          PROFILE_NAME=$(echo "$PROFILE_PLIST" | /usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin)
          cp "$PROFILE_SRC" "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed profile: $PROFILE_NAME ($PROFILE_UUID)"

      - name: Generate placeholder app icon
        run: |
          set -euo pipefail
          if ! command -v magick >/dev/null 2>&1 && ! command -v convert >/dev/null 2>&1; then
            echo "Installing ImageMagick..."
            brew install imagemagick
          fi
          IM=$(command -v magick || command -v convert)
          ICON_DIR="Resources/Assets.xcassets/AppIcon.appiconset"
          ICON_PATH="$ICON_DIR/AppIcon.png"

          # Homebrew's ImageMagick on macOS runners can't resolve system font
          # *names* (e.g. "Helvetica-Bold") through fontconfig — the system
          # fonts live outside the paths it scans. Pass a font FILE PATH
          # instead. Prefer a macOS-bundled font; fall back to a downloaded
          # TTF so the build is reproducible even if Apple reshuffles fonts.
          FONT_PATH=""
          for candidate in \
            "/System/Library/Fonts/Supplemental/Arial Bold.ttf" \
            "/System/Library/Fonts/Supplemental/Helvetica.ttc" \
            "/Library/Fonts/Arial Bold.ttf" \
            "/System/Library/Fonts/HelveticaNeue.ttc" \
            "/System/Library/Fonts/Helvetica.ttc"; do
            if [ -f "$candidate" ]; then
              FONT_PATH="$candidate"
              break
            fi
          done
          if [ -z "$FONT_PATH" ]; then
            echo "No system bold font found — downloading a fallback TTF"
            FONT_PATH="$RUNNER_TEMP/icon-font.ttf"
            curl -fsSL -o "$FONT_PATH" \
              "https://github.com/google/fonts/raw/main/apache/robotocondensed/static/RobotoCondensed-Bold.ttf"
          fi
          echo "Using font file: $FONT_PATH"

          "$IM" -size 1024x1024 xc:"#C97C5D" \
            -gravity center \
            -fill "#FFFDF8" \
            -font "$FONT_PATH" \
            -pointsize 520 \
            -annotate +0+0 "LC" \
            "$ICON_PATH"
          echo "Generated $ICON_PATH"
          ls -la "$ICON_PATH"

      - name: Archive
        run: |
          set -euo pipefail
          BUILD_NUMBER=$(( ${{ github.run_number }} + BUILD_NUMBER_OFFSET ))
          echo "Using CFBundleVersion: $BUILD_NUMBER"
          xcodebuild \
            -project LlamasCookbookNative.xcodeproj \
            -scheme LlamasCookbookNative \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            archive

      - name: Export .ipa
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>stripSwiftSymbols</key><true/>
            <key>uploadSymbols</key><true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          IPA=$(ls "$RUNNER_TEMP/export"/*.ipa | head -1)
          echo "IPA=$IPA" >> "$GITHUB_ENV"
          echo "Built $IPA"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-native-ipa-${{ github.run_number }}
          path: ${{ env.IPA }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload to TestFlight
        if: ${{ inputs.upload }}
        env:
          KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID" \
            --verbose
